id: policy-core-registry
title: Core Registry Policy
summary: Keep the demo registry tagged, named, and connected.
rules:
  - code: require-tag
    targetType: site
    value: apac
  - code: require-attribute
    targetType: host
    field: fqdn
  - code: allowed-relation
    targetType: service
    relationType: resolves_to
    allowedTargetTypes:
      - dns_record
